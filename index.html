
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JUSDATAS - Plataforma Jurídica Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              // Azul petróleo escuro (Cor principal)
              primary: '#2E446B',
              // Azul médio profundo
              deepPrimary: '#3F6FA1',
              // Azul vibrante tecnológico
              accent: '#2C5F9E',
              // Cinza azulado claro (fundo UI)
              secondary: '#D9E1E6',
              // Cinza claro neutro (cards)
              softGray: '#F2F4F6',
              // Azul claro suave (background gradiente)
              softBlue: '#8FB3C9',
              // Mantendo alias para compatibilidade com componentes existentes
              deepRed: '#3F6FA1', 
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            animation: {
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            }
          }
        }
      }
    </script>
    <style>
      body {
        background: linear-gradient(135deg, #D9E1E6 0%, #8FB3C9 100%);
        font-family: 'Inter', sans-serif;
        min-height: 100vh;
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #2E446B;
        border-radius: 10px;
      }
      /* Glassmorphism utility */
      .glass {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.3);
      }
    </style>
<script type="importmap">
{
  "imports": {
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4"
  }
}
</script>
